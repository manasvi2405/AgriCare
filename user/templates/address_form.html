{% extends 'userbase.html' %}
{% block content %}
{% load static %}
{% include "message.html" %}
<div class="container py-5">
    <h4 class="text-center">Add New Address</h4>
            <hr>
    <div class="row justify-content-center">
        <div class="col-10" style="padding-left: 200px;">
            <form action="" method="post" enctype="multipart/form-data" class="w-75 my-4">
                {% csrf_token %}
                {{form.as_p}}
                <div class="text-center">
                <button class="btn btn-dark bg-theme-dark p-2 px-5 rounded-pill">
                    {% if request.path == "/user/addaddress/" %}
                    Save{% else %} Update {% endif %} address
                </button>
                </div>
            </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
