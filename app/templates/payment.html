{% extends 'base.html'%}
{% load static %}
{% block "content"%}

<section class="bannerimg">
    <div class="py-5 text-center text-white">
        <p class="mt-4"><span class="border p-3 rounded "><a href="{%url 'home'%}" class="text-white">Home </a><img src="{%static 'images/leaf.png'%}" alt="" height="18" width="18"> Payment </span></p>
    </div>
</section>

<div class="d-flex justify-content-center container text-center py-5">
    <div class="border border-dark border-2 rounded py-5 w-50">
    <h1>Complete Your Payment</h1>
    <p>Order ID: {{ order.id }}</p>
    <p>Total Amount: <span class="fw-bold">₹{{ order.total_amount }}</span></p>
    <button id="rzp-button1" class="btn btn-dark rounded-pill bg-theme-dark btn-lg">Pay Now with Razorpay</button>
</div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
var options = {
    "key": "{{ razorpay_key_id }}",
    "amount": "{{ amount_in_paise }}",
    "currency": "{{ currency }}",
    "name": "AgriCare",
    "description": "Payment for Order #{{ order.id }}",
    "order_id": "{{ order.razorpay_order_id }}", // From your Order model
    "callback_url": "{{ callback_url }}",
    "prefill": {
        "name": "{{ order.shipping_address.full_name }}", // From Address model
        "contact": "{{ order.shipping_address.phone_number }}" // From Address model
    },
    "theme": { "color": "#394f36" }
};
var rzp1 = new Razorpay(options);
document.getElementById('rzp-button1').onclick = function(e){
    rzp1.open();
    e.preventDefault();
}
</script>
{% endblock %}
