{% extends 'base.html'%}
{% load static %}
{% block "content"%}
<section class="bannerimg">
    <div class="py-5 text-center text-white">
        <p class="mt-3"><span class="border rounded p-3"><a href="{% url 'home'%}" class="text-white">Home</a>
            <i class="bi bi-caret-right"></i>order confirmation
        <h1 class="mt-5 mb-3">Order Confirmation</h1>
    </div>
</section>
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-10 col-md-5 border border-dark border-2 p-5 ">
 <h1 class="text-center border-bottom border-dark border-2 pb-2">Order Failed ! </h1>
    <p>Order ID: {{ order.id }}</p>
    <p>
    Payment Status:
    {% if order.is_paid %}
        <span style="color:green;">Paid ✅</span>
    {% else %}
        <span style="color:red;">Pending (Cash on Delivery)</span>
    {% endif %}
</p>
<div class="text-center">
<a href="{% url 'checkout_view' %}"><button class="btn btn-dark bg-theme-dark rounded-pill px-3 py-1">Try Again</button></a></div>
        </div>
    </div>
   

</section>
{% endblock %}
