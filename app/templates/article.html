{% extends 'base.html'%}
{% load static %}
{% block "content"%}
<section class="bannerimg">
    <div class="py-5 text-center text-white">
        <p class="mt-3"><span class="border p-3 rounded ">
            <a href="{%url 'home'%}" class="text-white">Home </a><img src="{%static 'images/leaf.png'%}" alt="" height="18" width="18">
              <a href="{%url 'blog' article.category.id %}" class="text-white">{{article.category.name}} </a><img src="{%static 'images/leaf.png'%}" alt="" height="18" width="18">
            Article 
        </span></p>
        <h1 class="mt-5 mb-3">{{article.title}}</h1>
    </div>
</section>
<main class="container py-5">
<div class="row">
    <div class="col-md-9">
              <h3 class="text-capitalise">{{article.title}}</h3>
        <p><i class="bi bi-person-fill"></i>ADMIN |
            <i class="bi bi-calendar-event-fill"></i>
            {{article.created_at | date}}</p>
            <img src="/media/{{article.featured_image}}" class="w-100" height="450px" alt="">
        <p class="fs-5 text-muted py-3">{{article.subtitle}}</p>
        <img src="/media/{{article.article_image}}" class="w-100" height="450px">
        <div class="fs-5 py-3 text-justify">{{article.content | safe}}</div>
    </div>
</div>
</main>

{% endblock %}
